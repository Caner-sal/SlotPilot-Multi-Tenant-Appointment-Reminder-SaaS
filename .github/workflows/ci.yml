name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Debug environment
        run: |
          node --version
          npm --version
          npx --version || true
          echo "corepack: $(corepack --version 2>/dev/null || echo 'not found')"

      - name: Disable corepack enforcement
        run: corepack disable || true

      - name: Install dependencies
        run: npm ci
        env:
          PRISMA_SKIP_POSTINSTALL_GENERATE: "true"

      - name: Debug after install
        run: |
          ls node_modules/.bin/prisma || echo "prisma binary missing"
          ls node_modules/@prisma/engines/ || echo "engines dir missing"

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./test.db

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./test.db

      - name: Run tests
        run: npx vitest run
        env:
          DATABASE_URL: file:./test.db

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: file:./test.db
          AUTH_SECRET: ci-test-secret-32-chars-long-here
          NEXTAUTH_URL: http://localhost:3000
