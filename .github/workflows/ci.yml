name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web-quality:
    name: Web Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check runtime versions
        run: npm run check:node

      - name: Secret scan
        run: npm run check:secrets

      - name: Validate skills
        run: npm run validate:skills

      - name: Agent readiness check
        run: npm run agent:check

      - name: Prisma validate
        run: npm run prisma:validate
        env:
          DATABASE_URL: file:./test.db

      - name: Prisma generate
        run: npm run prisma:generate
        env:
          DATABASE_URL: file:./test.db

      - name: Prisma db push
        run: npm run prisma:dbpush
        env:
          DATABASE_URL: file:./test.db

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test
        env:
          DATABASE_URL: file:./test.db

      - name: Build web app
        run: npm run build
        env:
          DATABASE_URL: file:./test.db
          AUTH_SECRET: ci-auth-secret-32-chars-long-value
          NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-long-value
          NEXTAUTH_URL: http://localhost:3000

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: web-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: file:./test.db
          AUTH_SECRET: ci-auth-secret-32-chars-long-value
          NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-long-value
          NEXTAUTH_URL: http://localhost:3100
          NEXT_PUBLIC_APP_URL: http://localhost:3100

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e
        run: npm run test:e2e
        env:
          DATABASE_URL: file:./test.db
          AUTH_SECRET: ci-auth-secret-32-chars-long-value
          NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-long-value
          NEXTAUTH_URL: http://localhost:3100
          NEXT_PUBLIC_APP_URL: http://localhost:3100

  mobile-quality:
    name: Mobile Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Mobile typecheck
        run: npm run typecheck
        working-directory: mobile
