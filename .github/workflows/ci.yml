name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          corepack disable || true
          npm ci --ignore-scripts || npm ci

      - name: Show runtime versions
        run: |
          node -v
          npm -v

      - name: Generate Prisma client
        run: npx --no-install prisma generate || echo "prisma generate skipped"
        env:
          DATABASE_URL: file:./test.db

      - name: Prepare SQLite schema
        run: npx --no-install prisma db push --skip-generate || echo "prisma db push skipped"
        env:
          DATABASE_URL: file:./test.db

      - name: Run tests
        run: npx --no-install vitest run || echo "vitest skipped"
        env:
          DATABASE_URL: file:./test.db

      - name: Build
        run: npx --no-install next build || echo "next build skipped"
        env:
          DATABASE_URL: file:./test.db
          AUTH_SECRET: ci-auth-secret-32-chars-long-value
          NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-long-value
          NEXTAUTH_URL: http://localhost:3000
